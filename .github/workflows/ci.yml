name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: voxa
          POSTGRES_USER: voxa
          POSTGRES_PASSWORD: voxa
        ports: ['5433:5432']
        options: >-
          --health-cmd "pg_isready -U voxa -d voxa"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      # services не поддерживают команду запуска, поэтому MinIO — обычным
      # docker run с тем же зафиксированным образом, что и в docker-compose
      - name: MinIO для e2e
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=voxa -e MINIO_ROOT_PASSWORD=voxa-dev-minio \
            minio/minio:RELEASE.2025-04-22T22-12-26Z server /data
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live > /dev/null && exit 0
            sleep 1
          done
          echo "MinIO не поднялся:"; docker logs minio; exit 1

      # Версия pnpm берётся из поля packageManager в package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Установка зависимостей
        run: pnpm install --frozen-lockfile

      - name: Генерация Prisma-клиента
        run: pnpm db:generate

      - name: Линтер
        run: pnpm lint

      - name: Форматирование
        run: pnpm format:check

      - name: Сборка
        run: pnpm -r build

      - name: Проверка типов
        run: pnpm -r typecheck

      - name: Лицензии зависимостей
        run: pnpm licenses:check

      - name: E2e-тесты
        run: pnpm test:e2e
        env:
          DATABASE_URL: postgresql://voxa:voxa@localhost:5433/voxa?schema=e2e
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci-access-secret-0123456789
          JWT_REFRESH_SECRET: ci-refresh-secret-0123456789
          S3_BUCKET: voxa-e2e
          LINK_PREVIEW: 'off'
