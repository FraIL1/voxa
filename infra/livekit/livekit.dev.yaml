# LiveKit для локальной разработки (docker-compose.dev.yml).
# Ключи только для dev; прод берёт их из env LIVEKIT_KEYS (см. livekit.yaml).
port: 7880
rtc:
  tcp_port: 7881
  # Единый мультиплексированный UDP-порт: все участники через 7882.
  # Диапазон портов в Docker исчерпывался — load-test пускал только 8 из 15.
  udp_port: 7882
  use_external_ip: false
keys:
  voxa-dev: voxa-dev-livekit-secret-0123456789abcdef
logging:
  level: info
