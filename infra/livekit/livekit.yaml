# LiveKit для прода (docker-compose.yml). Ключи приходят из env LIVEKIT_KEYS.
# Сигналинг (WSS) идёт через Caddy: livekit.{DOMAIN} → livekit:7880;
# медиатрафик — напрямую через единый UDP-порт 7882 (открыть в UFW!).
port: 7880
rtc:
  tcp_port: 7881
  # Единый мультиплексированный UDP-порт — проще firewall, нет диапазонов
  udp_port: 7882
  # Автоопределение публичного IP VPS для ICE-кандидатов
  use_external_ip: true
logging:
  level: info
