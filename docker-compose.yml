# Прод-стек Voxa: весь бэкенд на одном VPS одной командой.
#   cp .env.example .env   (заполнить секреты!)
#   docker compose up -d --build
# Наружу торчит только Caddy (80/443); БД, Redis и MinIO — во внутренней сети.

name: voxa

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp' # HTTP/3
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      server:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '3000'
      DATABASE_URL: postgresql://voxa:${POSTGRES_PASSWORD}@postgres:5432/voxa
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: voxa-files
      # Подписанные ссылки на файлы указывают на поддомен за Caddy
      PUBLIC_S3_ENDPOINT: https://files.${DOMAIN}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      PUBLIC_LIVEKIT_URL: ${PUBLIC_LIVEKIT_URL:-wss://livekit.${DOMAIN}}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/healthz > /dev/null || exit 1']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: voxa
      POSTGRES_USER: voxa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voxa -d voxa']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    # Зафиксированная версия: последний релиз MinIO с полноценной веб-консолью
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 3s
      retries: 5

  livekit:
    image: livekit/livekit-server:v1.13.3
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    ports:
      - '7881:7881' # WebRTC по TCP (фолбэк при закрытом UDP)
      - '50000-50199:50000-50199/udp' # медиапотоки (открыть в UFW!)
    environment:
      # формат: "ключ: секрет"
      LIVEKIT_KEYS: '${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}'
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro

volumes:
  caddy_data:
  caddy_config:
  pg_data:
  redis_data:
  minio_data:
