# Локальная разработка: ТОЛЬКО инфраструктура (PostgreSQL, Redis, MinIO).
# Сервер и веб-клиент запускаются на хосте: pnpm dev:server / pnpm dev:web.
#   docker compose -f docker-compose.dev.yml up -d

name: voxa-dev

services:
  postgres:
    image: postgres:17-alpine
    ports:
      # 5433 снаружи: на 5432 у разработчика может жить нативный PostgreSQL Windows
      - '5433:5432'
    environment:
      POSTGRES_DB: voxa
      POSTGRES_USER: voxa
      POSTGRES_PASSWORD: voxa # только для локальной разработки
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voxa -d voxa']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # веб-консоль: http://localhost:9001 (voxa / voxa-dev-minio)
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: voxa
      MINIO_ROOT_PASSWORD: voxa-dev-minio
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 3s
      retries: 5

  livekit:
    image: livekit/livekit-server:v1.13.3
    command: --config /etc/livekit.yaml
    ports:
      - '7880:7880' # сигналинг (WS/HTTP)
      - '7881:7881' # WebRTC по TCP (фолбэк)
      - '7882:7882/udp' # медиапотоки (единый мультиплексированный порт)
    volumes:
      - ./infra/livekit/livekit.dev.yaml:/etc/livekit.yaml:ro

volumes:
  pg_data:
  redis_data:
  minio_data:
